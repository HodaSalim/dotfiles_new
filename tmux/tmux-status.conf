set -g status-interval 1
set -g status "on"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Status bar background
set -g status-style bg=#191724,fg=#e0def4

# Messages
set -g message-style bg=#26233a,fg=#e0def4
set -g message-command-style bg=#26233a,fg=#e0def4

# Pane borders
set -g pane-border-style fg=#403d52
set -g pane-active-border-style fg=#ebbcba

# Window status
setw -g window-status-style bg=#191724,fg=#6e6a86
setw -g window-status-activity-style bg=#191724,fg=#f6c177
setw -g window-status-separator ""

# Left status
set -g status-left "#[fg=#f6c177] #[fg=#c4a7e7,bold]#S #[fg=#6e6a86,nobold]"

# Right status (kept your structure, fixed TZ + colors)
set -g status-right "#{battery_status_bg} #{battery_icon} #{battery_percentage} \
#[fg=#403d52]#[fg=#ebbcba,bg=#403d52]  \
#[fg=#e0def4,bg=#403d52]#(TZ=':Africa/Cairo' date '+%%r') \
#[fg=#6e6a86,bg=#403d52] \
#[fg=#9ccfd8,bg=#403d52]#(TZ=':America/Los_Angeles' date '+%%r') \
#[fg=#191724,bg=#403d52]#[fg=#e0def4,bg=#191724]  #h "

# Inactive window
setw -g window-status-format "#[fg=#6e6a86,bg=#191724] #I  #[fg=#6e6a86]#W "

# Active window
setw -g window-status-current-format "#[fg=#191724,bg=#ebbcba]\
#[fg=#191724,bg=#ebbcba,bold] #I  #W \
#[fg=#ebbcba,bg=#191724]"

# Bell
set -g window-status-bell-style fg=#eb6f92,none

